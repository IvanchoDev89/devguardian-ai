# DevGuardian AI - Docker Compose
# SECURITY: All ports bound to 127.0.0.1 for local development only
# To expose to network, change "127.0.0.1:PORT:PORT" to "PORT:PORT"

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: devguardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devguardian_ai
      POSTGRES_USER: devguardian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devguardian123}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devguardian-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devguardian -d devguardian_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for rate limiting/caching)
  redis:
    image: redis:7-alpine
    container_name: devguardian-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - devguardian-network
    security_opt:
      - no-new-privileges:true
    read_only: true

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devguardian-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://devguardian:${POSTGRES_PASSWORD:-devguardian123}@postgres:5432/devguardian_ai
      USE_POSTGRES: "true"
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-at-least-32-characters-long}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      HOST: 0.0.0.0
      PORT: 8002
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devguardian-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devguardian-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - devguardian-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  devguardian-network:
    driver: bridge