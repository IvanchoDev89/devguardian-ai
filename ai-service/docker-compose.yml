version: '3.8'

services:
  ai-service:
    build: .
    ports:
      - "8002:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app/app
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
