name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript-typescript, python

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.33.1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        skip-dirs: 'frontend/node_modules,backend/venv,backend/__pycache__,.git'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Dependency Security Audit (Python - Backend)
      continue-on-error: true
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip-audit -r requirements.txt || true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Dependency Security Audit (Node.js)
      continue-on-error: true
      working-directory: ./frontend
      run: |
        npm ci
        npm audit --audit-level moderate || true
    
    - name: Run Bandit security linter (Python - Backend)
      working-directory: ./backend
      run: |
        pip install bandit
        bandit -r app/ -f json -o bandit-report.json || true
    
    - name: Run Semgrep (Python & JavaScript)
      uses: returntocorp/semgrep-action@v1
      with:
        config: "auto"
        repo-root: ./backend
    
    - name: Security scan summary
      run: |
        echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Trivy: File system scan completed" >> $GITHUB_STEP_SUMMARY
        echo "- CodeQL: Static analysis completed" >> $GITHUB_STEP_SUMMARY
        echo "- Dependencies: Audit completed for backend and frontend" >> $GITHUB_STEP_SUMMARY
        echo "- Bandit: Python security linter completed" >> $GITHUB_STEP_SUMMARY
        echo "- Semgrep: Multi-language analysis completed" >> $GITHUB_STEP_SUMMARY