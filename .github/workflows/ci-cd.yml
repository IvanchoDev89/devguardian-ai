name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: devguardian_ai
          POSTGRES_USER: devguardian
          POSTGRES_PASSWORD: devguardian123
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
      
      - name: Copy environment file
        run: cp backend/.env.example backend/.env
      
      - name: Run backend tests
        working-directory: ./backend
        run: |
          source venv/bin/activate
          python -m pytest tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security scan on backend
        uses: trip/autosemgrep-action@v1.0.0
        with:
          verbose: true
          repo-root: ./backend
          config: "auto"
          skip-dirs: "venv,__pycache__,.pytest_cache"
      
      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: docker-compose build
      
      - name: Test Docker startup
        run: docker-compose up -d && sleep 10 && docker-compose ps